<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="src/styles/global.css">
  <link rel="stylesheet" href="src/styles/index.css">
  <title>Mais Saúde</title>
</head>
<body>
  <header id="header">
    <div class="container">
      <div class="container_header">
        <div class="container_logo">
          <img src="src/images/icon_logo.svg" alt="Ícone logo">
          <span class="logo-name">SUS</span>
          <span class="logo-description"> Sistema <br> Único de <br> Saúde </span>
        </div>
        
        <div>
          <ul class="list_links_header">
            <li class="links"> <a href=""> Home </a> </li>
            <li class="links"> <a href="#aplications"> Aplicações </a> </li>
            <li class="links"> <a href="#myHealth"> Minha Saúde </a> </li>
            <li class="links"> <a href="#contents"> Conteúdos </a> </li>
          </ul>
        </div>
      </div>
    </div>
  </header>
  <main>
    <section class="container">
      <div id="container_banner">
          <h1 class="text_banner">+SUS<br> Conheça seus <br> direitos, <br> valorize sua <br> saúde!</h1>
          <img class="image_banner" src="src/images/image_banner.png" alt="Imagem do banner">
      </div>
    </section>

    <section class="container">
      <div id="container_data">
        <h1 class="title_data">Dados SUS</h1>
        <div class="data">
          <div class="data_content">
              <h2>+264</h2>
              <p>Milhões</p>
            <p>Consultas Médicas</p>
          </div>
          
          <div class="data_content">
            <h2>+1</h2>
            <p>Bilhão</p>
            <p>Exames</p>
          </div>
          
          <div class="data_content">
            <h2>+66</h2>
            <p>Milhões</p>
            <p>Terapias</p>
          </div>
          
          <div class="data_content">
            <h2>+8</h2>
            <p>Milhões</p>
            <p>Internações</p>
          </div>
        </div>
        <span>*Dados atualizados em 2022</span>
      </div>
    </section>
  </main>
</body>
</html>
